<div class="card shadow question-card">

    <div class="card-body">

        <h2 class="mb-4">
            Informations personnelles
        </h2>

        <div class="row">

            <div class="col-md-6 mb-3">

                <label for="nom">Nom</label>

                <input
                    id="nom"
                    type="text"
                    class="form-control"
                    autocomplete="family-name">

            </div>

            <div class="col-md-6 mb-3">

                <label for="prenom">Prénom</label>

                <input
                    id="prenom"
                    type="text"
                    class="form-control"
                    autocomplete="given-name">

            </div>

        </div>

        <div class="row">

            <div class="col-md-6 mb-3">

                <label for="surnom">Surnom(s)</label>

                <input
                    id="surnom"
                    type="text"
                    class="form-control">

            </div>

            <div class="col-md-6 mb-3">

                <label for="dateNaissance">
                    Date de naissance
                </label>

                <input
                    id="dateNaissance"
                    type="date"
                    class="form-control">

            </div>

        </div>

        <div class="mb-3">

            <label for="lieuNaissance">
                Lieu de naissance
            </label>

            <input
                id="lieuNaissance"
                type="text"
                class="form-control">

        </div>

        <div class="mb-3">

            <label for="photoIdentite">

                Photo

            </label>

            <input

                id="photoIdentite"

                type="file"

                class="form-control"

                accept="image/*">

        </div>

        <div
    id="previewPhoto"
    class="text-center mt-4">

    <img

        src="../assets/images/avatar.png"

        alt="Avatar"

        class="img-fluid rounded-circle"

        style="width:180px;height:180px;object-fit:cover;">

</div>

    </div>

</div>
