<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mon histoire, mes souvenirs, ma vie</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/formulaire.css">

<link rel="stylesheet" href="css/responsive.css">

<link rel="stylesheet" href="css/couverture.css">
</head>

<body>

<header class="shadow-sm">

    <div class="container-fluid">

       <div class="d-flex align-items-center gap-3">

    <img
        src="assets/logos/logo.png"
        alt="Logo"
        style="height:60px;">

    <div>

        <h1 class="mb-0">
            Mon histoire, mes souvenirs, ma vie
        </h1>

        <p class="mb-0">
            Livret de transmission familiale
        </p>

    </div>

</div>

        <p class="mb-2">
            Livret de transmission familiale
        </p>

        <div class="progress">

            <div
                id="progressBar"
                class="progress-bar"
                role="progressbar"
                style="width:0%;">

                0%

            </div>

        </div>

        <div
            id="progressText"
            class="small text-muted">

            0 réponse

        </div>

        <div
            id="saveStatus"
            class="small text-success mt-2">

            Sauvegarde automatique activée

        </div>

    </div>

</header>



<div id="app">

    <aside>

        <h3>Sommaire</h3>

        <div
            id="chapters"
            class="list-group">

        </div>

    </aside>



    <main>

        <div id="content"></div>

        <footer>

            Livret de transmission familiale

        </footer>

    </main>

</div>



<div
class="position-fixed bottom-0 end-0 p-3"
style="z-index:2000;">

    <div class="btn-group-vertical shadow">

        <button
            class="btn btn-primary"
            onclick="exporterPDF()">

            <img
src="assets/icons/pdf.svg"
height="18"
class="me-2">

Export PDF

        </button>

        <button
            class="btn btn-success"
            onclick="exporterJSON()">

            💾 Sauvegarder

        </button>

        <button
            class="btn btn-warning"
            onclick="document.getElementById('importJSON').click()">

            📂 Importer

        </button>

        <button
            class="btn btn-danger"
            onclick="viderLivret()">

            🗑 Réinitialiser

        </button>

    </div>

</div>



<input
type="file"
id="importJSON"
accept=".json"
hidden
onchange="importerJSON(this.files[0])"
>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script src="js/questions.js"></script>
<script src="js/app.js"></script>
<script src="js/storage.js"></script>
<script src="js/upload.js"></script>
<script src="js/pdf.js"></script>
<script src="js/home.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
